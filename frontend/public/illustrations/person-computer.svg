<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="200" cy="200" r="180" fill="url(#bg)" opacity="0.5"/>
  <!-- Desk -->
  <rect x="60" y="290" width="280" height="8" rx="4" fill="#92400E"/>
  <rect x="80" y="298" width="10" height="50" rx="3" fill="#78350F"/>
  <rect x="310" y="298" width="10" height="50" rx="3" fill="#78350F"/>
  <!-- Monitor -->
  <rect x="140" y="150" width="120" height="90" rx="8" fill="#1E293B"/>
  <rect x="148" y="158" width="104" height="72" rx="4" fill="url(#screen)"/>
  <!-- Screen chat -->
  <rect x="158" y="170" width="50" height="10" rx="5" fill="white" opacity="0.8"/>
  <rect x="158" y="186" width="35" height="10" rx="5" fill="white" opacity="0.6"/>
  <rect x="192" y="202" width="40" height="10" rx="5" fill="white" opacity="0.8"/>
  <rect x="192" y="218" width="28" height="10" rx="5" fill="white" opacity="0.6"/>
  <!-- Monitor stand -->
  <rect x="190" y="240" width="20" height="20" rx="2" fill="#475569"/>
  <rect x="180" y="260" width="40" height="8" rx="2" fill="#334155"/>
  <!-- Person -->
  <ellipse cx="260" cy="270" rx="25" ry="32" fill="#10B981"/>
  <ellipse cx="260" cy="200" rx="22" ry="24" fill="#FCD34D"/>
  <ellipse cx="260" cy="186" rx="24" ry="18" fill="#292524"/>
  <ellipse cx="248" cy="192" rx="8" ry="14" fill="#292524"/>
  <ellipse cx="272" cy="192" rx="8" ry="14" fill="#292524"/>
  <!-- Eyes -->
  <ellipse cx="253" cy="200" rx="3" ry="3.5" fill="#292524"/>
  <ellipse cx="267" cy="200" rx="3" ry="3.5" fill="#292524"/>
  <circle cx="254" cy="199" r="1" fill="white" opacity="0.8"/>
  <circle cx="268" cy="199" r="1" fill="white" opacity="0.8"/>
  <!-- Smile -->
  <path d="M254 210 Q260 216 266 210" stroke="#292524" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Arms -->
  <path d="M238 250 Q220 260 218 275" stroke="#FCD34D" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M282 250 Q300 260 302 275" stroke="#FCD34D" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Keyboard -->
  <rect x="145" y="278" width="70" height="14" rx="3" fill="#475569"/>
  <rect x="150" y="280" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="158" y="280" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="166" y="280" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="174" y="280" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="182" y="280" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="190" y="280" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="198" y="280" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="150" y="286" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="158" y="286" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="166" y="286" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="174" y="286" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="182" y="286" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="190" y="286" width="6" height="4" rx="1" fill="#64748B"/>
  <rect x="198" y="286" width="6" height="4" rx="1" fill="#64748B"/>
  <!-- Decorative dots -->
  <circle cx="340" cy="140" r="3" fill="#10B981" opacity="0.3"/>
  <circle cx="60" cy="130" r="2" fill="#10B981" opacity="0.2"/>
  <circle cx="350" cy="220" r="2" fill="#10B981" opacity="0.2"/>
</svg>
