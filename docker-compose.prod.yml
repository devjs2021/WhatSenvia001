services:

  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    image: whatsenvia-backend:latest
    container_name: whatsenvia-backend
    restart: unless-stopped
    env_file: .env.prod
    ports:
      - "3001:3001"
    volumes:
      - whatsapp_sessions:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - whatsenvia

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    image: whatsenvia-frontend:latest
    container_name: whatsenvia-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - whatsenvia

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: whatsenvia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-whatsenvia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsenvia

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: whatsenvia-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsenvia

volumes:
  postgres_data:
  redis_data:
  whatsapp_sessions:

networks:
  whatsenvia:
    driver: bridge
